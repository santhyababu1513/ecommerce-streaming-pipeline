apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-pipeline
  template:
    metadata:
      labels:
        app: ecommerce-pipeline
    spec:
      containers:

        - name: producer
          image: ecommerce-streaming-pipeline-producer:latest
          imagePullPolicy: Never

        - name: spark
          image: ecommerce-streaming-pipeline-spark:latest
          imagePullPolicy: Never